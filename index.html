<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Venus Traders — Pune's Stationery Superstore Since 1974</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo"><span class="logo-mark">V</span>Venus Traders</a>
    <div class="nav-links">
      <a href="#heritage">Our Story</a>
      <a href="#categories">What We Stock</a>
      <a href="#brands">Beyond the Shelf</a>
      <a href="corporate.html">Corporate</a>
      <a href="#stores">Visit Us</a>
    </div>
    <a href="#stores" class="nav-cta">Find your nearest store →</a>
  </div>
</nav>

<header class="hero">
  <div class="container">
    <div id="hero-tag" class="hero-tag"></div>
    <h1 id="hero-heading"></h1>
    <div class="hero-grid">
      <div>
        <p id="hero-lede" class="hero-lede"></p>
        <div class="hero-actions">
          <a id="hero-primary-cta" href="#" class="btn btn-primary"></a>
          <a id="hero-secondary-cta" href="#" class="btn btn-secondary"></a>
        </div>
      </div>
      <aside class="hero-card">
        <div id="hero-quote-label" class="hero-card-label"></div>
        <p id="hero-quote-text" class="hero-card-quote"></p>
        <div id="hero-quote-sig" class="hero-card-sig"></div>
      </aside>
    </div>
    <div id="hero-stamps" class="hero-stamps"></div>
  </div>
</header>

<section id="heritage" class="heritage">
  <div class="container">
    <div id="heritage-label" class="sec-label"></div>
    <h2 id="heritage-title" class="sec-title"></h2>
    <p id="heritage-lede" class="sec-lede"></p>
    <div id="timeline" class="timeline"></div>
  </div>
</section>

<section id="categories">
  <div class="container">
    <div class="cat-head">
      <div>
        <div id="categories-label" class="sec-label"></div>
        <h2 id="categories-title" class="sec-title"></h2>
      </div>
      <p id="categories-intro" style="max-width:340px;color:var(--ink-soft);font-size:15px"></p>
    </div>
    <div id="cat-grid" class="cat-grid"></div>
  </div>
</section>

<section id="brands" class="brands">
  <div class="container">
    <div id="brands-label" class="sec-label"></div>
    <h2 id="brands-title" class="sec-title"></h2>
    <p id="brands-lede" class="sec-lede"></p>
    <div id="brand-grid" class="brand-grid"></div>
  </div>
</section>

<section id="corporate" class="corp corp-teaser">
  <div class="container">
    <div class="corp-teaser-inner">
      <div>
        <div id="corp-teaser-label" class="sec-label"></div>
        <h2 id="corp-teaser-title" class="sec-title" style="margin-bottom:14px"></h2>
        <p id="corp-teaser-text" class="sec-lede" style="margin-bottom:0"></p>
      </div>
      <a id="corp-teaser-btn" href="corporate.html" class="btn btn-primary corp-teaser-btn"></a>
    </div>
  </div>
</section>

<section id="stores">
  <div class="container">
    <div class="store-grid">
      <div class="store-visual">
        <div id="stores-visual-heading" class="big"></div>
        <p id="stores-visual-sub" class="sub"></p>
      </div>
      <div id="store-list" class="store-list"></div>
    </div>
  </div>
</section>

<section class="testi">
  <div class="container">
    <div id="testi-label" class="sec-label"></div>
    <h2 id="testi-title" class="sec-title"></h2>
    <div id="testi-grid" class="testi-grid"></div>
    <p id="testi-note" style="margin-top:24px;font-size:13px;color:var(--ink-soft)"></p>
  </div>
</section>

<section class="cta">
  <div class="container">
    <h2 id="cta-heading"></h2>
    <p id="cta-text"></p>
    <a id="cta-btn" href="#" class="btn"></a>
  </div>
</section>

<footer>
  <div class="container">
    <div class="foot-grid">
      <div class="foot-brand">
        <div class="logo"><span class="logo-mark">V</span>Venus Traders</div>
        <p id="footer-blurb"></p>
      </div>
      <div class="foot-col">
        <h6>Shop</h6>
        <ul id="footer-shop-links"></ul>
      </div>
      <div class="foot-col">
        <h6>Company</h6>
        <ul id="footer-company-links"></ul>
      </div>
      <div class="foot-col">
        <h6>Visit</h6>
        <ul id="footer-visit-links"></ul>
      </div>
    </div>
    <div class="foot-bottom">
      <span id="footer-copyright"></span>
      <span id="footer-tagline"></span>
    </div>
  </div>
</footer>

<script src="home-content.js"></script>
</body>
</html>
