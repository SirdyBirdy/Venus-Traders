<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Corporate Supply — Venus Traders, Pune</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo"><span class="logo-mark">V</span>Venus Traders</a>
    <div class="nav-links">
      <a href="index.html#heritage">Our Story</a>
      <a href="index.html#categories">What We Stock</a>
      <a href="index.html#brands">Beyond the Shelf</a>
      <a href="corporate.html">Corporate</a>
      <a href="index.html#stores">Visit Us</a>
    </div>
    <a href="#corp-form" class="nav-cta">Request a quote →</a>
  </div>
</nav>

<header class="corp-hero">
  <div class="container">
    <div id="corp-breadcrumb" class="breadcrumb"></div>
    <div id="corp-hero-label" class="sec-label"></div>
    <h1 id="corp-hero-heading"></h1>
    <p id="corp-hero-lede"></p>
    <div class="hero-actions">
      <a href="#corp-form" class="btn btn-primary">Request a quote →</a>
      <a href="index.html" class="btn btn-secondary">Back to home</a>
    </div>
    <div id="corp-stats" class="corp-stats"></div>
  </div>
</header>

<section id="features">
  <div class="container">
    <div id="features-label" class="sec-label"></div>
    <h2 id="features-title" class="sec-title"></h2>
    <p id="features-lede" class="sec-lede"></p>
    <div id="feature-grid" class="feature-grid"></div>
  </div>
</section>

<section id="process" class="brands">
  <div class="container">
    <div id="process-label" class="sec-label"></div>
    <h2 id="process-title" class="sec-title"></h2>
    <div id="process-grid" class="process"></div>
  </div>
</section>

<section id="who-we-serve">
  <div class="container">
    <div id="who-label" class="sec-label"></div>
    <h2 id="who-title" class="sec-title"></h2>
    <div id="who-grid" class="who-grid"></div>
  </div>
</section>

<section id="faq" class="brands">
  <div class="container">
    <div id="faq-label" class="sec-label"></div>
    <h2 id="faq-title" class="sec-title"></h2>
    <div id="faq-list" class="faq-list"></div>
  </div>
</section>

<section id="corp-form">
  <div class="container">
    <form class="corp-full-form" onsubmit="event.preventDefault()">
      <h4 id="form-heading"></h4>
      <p id="form-sub"></p>
      <div class="form-row">
        <input id="field-company" class="input" />
        <input id="field-name" class="input" />
      </div>
      <div class="form-row">
        <input id="field-email" class="input" type="email" />
        <input id="field-phone" class="input" type="tel" />
      </div>
      <textarea id="field-need" class="input"></textarea>
      <button id="form-submit" class="btn btn-primary"></button>
    </form>
  </div>
</section>

<footer>
  <div class="container">
    <div class="foot-grid">
      <div class="foot-brand">
        <div class="logo"><span class="logo-mark">V</span>Venus Traders</div>
        <p id="footer-blurb"></p>
      </div>
      <div class="foot-col">
        <h6>Shop</h6>
        <ul id="footer-shop-links"></ul>
      </div>
      <div class="foot-col">
        <h6>Company</h6>
        <ul id="footer-company-links"></ul>
      </div>
      <div class="foot-col">
        <h6>Visit</h6>
        <ul id="footer-visit-links"></ul>
      </div>
    </div>
    <div class="foot-bottom">
      <span id="footer-copyright"></span>
      <span id="footer-tagline"></span>
    </div>
  </div>
</footer>

<script src="corporate-content.js"></script>
</body>
</html>
